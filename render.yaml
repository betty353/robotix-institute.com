# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Link this repo in Render Dashboard → Blueprints → New Blueprint Instance → select branch.
#
# After the first deploy, open your web service URL and set dashboard env vars
# NEXT_PUBLIC_SITE_URL + NEXT_PUBLIC_APP_URL to https://YOUR-SERVICE.onrender.com then redeploy,
# because Next.js bakes NEXT_PUBLIC_* at build time.
#
# First-time DB: PostgreSQL provisions here; prisma db push runs in preDeploy.

databases:
  - name: robotix-institute-db
    databaseName: robotix_institute
    user: robotix
    region: virginia # change if you prefer oregon/frankfurt in dashboard

services:
  - type: web
    name: robotix-institute
    runtime: node
    region: virginia
    plan: free
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push --accept-data-loss
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: DATABASE_URL
        fromDatabase:
          name: robotix-institute-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Replace with https://robotix-institute.onrender.com (your actual hostname) before depending on OG URLs:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: Robotix Institute
